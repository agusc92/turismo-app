services:
  mysql:
    image: mysql:8.0
    container_name: turismo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: turismo_db
      MYSQL_USER: turismo_user
      MYSQL_PASSWORD: turismo_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: turismo_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_USER: turismo_user
      PMA_PASSWORD: turismo_pass
    ports:
      - "8080:80"
    depends_on:
      - mysql

volumes:
  mysql_data: